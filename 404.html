.nf-links{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.nf-links .btn-primary{background:#F5C84A;color:#1a0e00;border:none;}
.nf-links .btn-outline{border-color:rgba(255,255,255,.4);color:white;}
.nf-links .btn-outline:hover{background:rgba(255,255,255,.1);}
