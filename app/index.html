<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1">
<title>Milou Dogs</title>
<meta name="description" content="Application Milou Dogs Provence — réservations, profils et carnet de santé de vos chiens.">
<meta name="theme-color" content="#4A3F72">
<link rel="manifest" href="manifest.webmanifest">
<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Milou Dogs">
<link rel="apple-touch-icon" href="icons/icon.svg">
<link rel="icon" href="icons/icon.svg" type="image/svg+xml">
<link rel="stylesheet" href="app.css">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <img class="logo" src="icons/icon.svg" alt="Milou Dogs">
  <div class="name">Milou Dogs</div>
  <div class="sub">Provence</div>
  <div class="spin"></div>
</div>

<!-- AUTH -->
<div id="auth-screen" class="hidden">
  <div class="auth-brand">
    <img src="icons/icon.svg" alt="Milou Dogs">
    <h1>Milou Dogs Provence</h1>
    <p>Votre espace garde de chiens 🐾</p>
  </div>
  <div class="auth-card">
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-login" onclick="App.showAuthTab('login')">Connexion</button>
      <button class="auth-tab" id="tab-signup" onclick="App.showAuthTab('signup')">Inscription</button>
    </div>

    <!-- LOGIN -->
    <form id="form-login" onsubmit="return App.login(event)">
      <div class="field">
        <label for="lg-email">E-mail</label>
        <input type="email" id="lg-email" autocomplete="email" placeholder="vous@email.com" required>
      </div>
      <div class="field">
        <label for="lg-pwd">Mot de passe</label>
        <input type="password" id="lg-pwd" autocomplete="current-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn" id="lg-btn">Se connecter</button>
      <div class="auth-link"><a href="#" onclick="return App.resetPwd()">Mot de passe oublié ?</a></div>
    </form>

    <!-- SIGNUP -->
    <form id="form-signup" class="hidden" onsubmit="return App.signup(event)">
      <div class="row-2">
        <div class="field"><label for="su-prenom">Prénom</label><input type="text" id="su-prenom" autocomplete="given-name" placeholder="Sophie" required></div>
        <div class="field"><label for="su-nom">Nom</label><input type="text" id="su-nom" autocomplete="family-name" placeholder="Martin" required></div>
      </div>
      <div class="field"><label for="su-email">E-mail</label><input type="email" id="su-email" autocomplete="email" placeholder="vous@email.com" required></div>
      <div class="field"><label for="su-tel">Téléphone</label><input type="tel" id="su-tel" autocomplete="tel" inputmode="tel" placeholder="06 12 34 56 78"></div>
      <div class="field"><label for="su-pwd">Mot de passe</label><input type="password" id="su-pwd" autocomplete="new-password" placeholder="Minimum 6 caractères" required></div>
      <button type="submit" class="btn" id="su-btn">Créer mon compte</button>
    </form>

    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header class="app-topbar">
    <div class="tb-title" id="tb-title">Accueil</div>
    <div class="tb-avatar" id="tb-avatar" onclick="App.go('profil')">🐾</div>
  </header>

  <main id="view-container">
    <!-- ACCUEIL -->
    <section id="view-home" class="view active">
      <div id="home-hero" class="hero-card">
        <div class="hi">Bonjour 👋</div>
        <h2 id="home-name">…</h2>
        <p id="home-sub">Bienvenue dans votre espace Milou Dogs.</p>
      </div>
      <div id="home-next"></div>
      <div class="section-label">Accès rapide</div>
      <div class="quick-grid">
        <button class="quick" onclick="App.go('reservation')"><span class="qic">📅</span><span class="qt">Réserver</span><span class="qs">Nouveau séjour</span></button>
        <button class="quick" onclick="App.go('chiens')"><span class="qic">🐕</span><span class="qt">Mes chiens</span><span class="qs">Profils & carnet</span></button>
        <button class="quick" onclick="App.go('avis')"><span class="qic">⭐</span><span class="qt">Avis</span><span class="qs">Témoignages</span></button>
        <button class="quick" onclick="App.go('profil')"><span class="qic">👤</span><span class="qt">Profil</span><span class="qs">Mes infos</span></button>
      </div>
    </section>

    <!-- RESERVATION -->
    <section id="view-reservation" class="view"><div id="reservation-body"></div></section>
    <!-- MES CHIENS -->
    <section id="view-chiens" class="view"><div id="chiens-body"></div></section>
    <!-- AVIS -->
    <section id="view-avis" class="view"><div id="avis-body"></div></section>
    <!-- PROFIL -->
    <section id="view-profil" class="view"><div id="profil-body"></div></section>
  </main>

  <nav class="tabbar">
    <button class="tab active" data-view="home"        onclick="App.go('home')"><span class="ic">🏠</span>Accueil</button>
    <button class="tab"        data-view="reservation" onclick="App.go('reservation')"><span class="ic">📅</span>Réserver</button>
    <button class="tab"        data-view="chiens"      onclick="App.go('chiens')"><span class="ic">🐕</span>Chiens</button>
    <button class="tab"        data-view="avis"        onclick="App.go('avis')"><span class="ic">⭐</span>Avis</button>
    <button class="tab"        data-view="profil"      onclick="App.go('profil')"><span class="ic">👤</span>Profil</button>
  </nav>
</div>

<div id="toast"></div>
<div id="lightbox" onclick="App.closeLightbox()"><img id="lightbox-img" src="" alt=""></div>

<!-- Invite d'installation -->
<div id="install-banner" style="display:none;position:fixed;left:12px;right:12px;bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 12px);z-index:9990;background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow-lg);padding:12px 14px;align-items:center;gap:12px;">
  <img src="icons/icon.svg" alt="" style="width:40px;height:40px;border-radius:11px;flex-shrink:0;">
  <div style="flex:1;min-width:0;">
    <div style="font-weight:800;color:var(--lavande-dark);font-size:.86rem;">Installer l'application</div>
    <div id="install-sub" style="font-size:.74rem;color:var(--text-muted);">Accès rapide depuis votre écran d'accueil.</div>
  </div>
  <button id="install-go" class="btn btn-sm btn-soleil" style="width:auto;">Installer</button>
  <button onclick="document.getElementById('install-banner').style.display='none'" style="font-size:1.2rem;color:var(--text-muted);padding:4px;">✕</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="app.js"></script>
<script src="chiens.js"></script>
<script src="reservation.js"></script>
<script src="profil.js"></script>
<script src="avis.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(() => {}));
  }

  // ── Invite d'installation (PWA) ──────────────────────────────
  (function () {
    var banner = document.getElementById('install-banner');
    var btn = document.getElementById('install-go');
    var sub = document.getElementById('install-sub');
    var standalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    if (standalone) return; // déjà installée

    var deferred = null;
    window.addEventListener('beforeinstallprompt', function (e) {
      e.preventDefault(); deferred = e;
      banner.style.display = 'flex';
    });
    btn.addEventListener('click', function () {
      if (!deferred) return;
      deferred.prompt();
      deferred.userChoice.finally(function () { deferred = null; banner.style.display = 'none'; });
    });
    window.addEventListener('appinstalled', function () { banner.style.display = 'none'; });

    // iOS : pas d'event beforeinstallprompt → instructions manuelles
    var isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    if (isIOS && !localStorage.getItem('iosInstallSeen')) {
      setTimeout(function () {
        if (banner.style.display === 'flex') return;
        btn.style.display = 'none';
        sub.innerHTML = 'Appuyez sur <b>Partager</b> ⬆️ puis <b>« Sur l\'écran d\'accueil »</b>.';
        banner.style.display = 'flex';
        localStorage.setItem('iosInstallSeen', '1');
      }, 3500);
    }
  })();
</script>
</body>
</html>
